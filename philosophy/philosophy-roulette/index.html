<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 기기에서도 예쁘게 보이도록 화면 크기를 맞춰주는 태그입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 검색 엔진(구글, 네이버)에 우리 앱이 잘 노출되도록 하는 SEO(검색 엔진 최적화) 설정입니다 -->
    <title>행복칠 철학자 상담소 | 나의 고민 해결 룰렛</title>
    <meta name="description" content="명상과 철학의 채널 행복칠TV에서 제공하는 철학자 고민 상담소입니다. 쇼펜하우어와 톨스토이의 명언으로 오늘 하루의 해답을 찾아보세요.">
    
    <!-- Google Fonts에서 우아하고 현대적인 느낌의 폰트(Pretendard/Noto Serif)를 가져옵니다 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- 우리가 예쁘게 꾸밀 CSS 디자인 파일을 연결합니다 -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- 밤하늘이나 우주 같은 배경 효과를 줄 공간입니다 -->
    <div class="background-effect"></div>

    <!-- 상단 철학자 갤러리 (가로 자동 스크롤) -->
    <div class="marquee-container">
        <div class="marquee-content">
            <!-- 1세트 -->
            <a href="https://www.youtube.com/results?search_query=행복칠TV+쇼펜하우어" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Arthur_Schopenhauer_by_J_Sch%C3%A4fer%2C_1859b.jpg/400px-Arthur_Schopenhauer_by_J_Sch%C3%A4fer%2C_1859b.jpg" alt="쇼펜하우어">
                <span class="name">쇼펜하우어</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+톨스토이" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Tolstoy_in_1897.jpg/400px-Tolstoy_in_1897.jpg" alt="톨스토이">
                <span class="name">톨스토이</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+니체" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Nietzsche187a.jpg/400px-Nietzsche187a.jpg" alt="니체">
                <span class="name">니체</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+아우렐리우스" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Marcus_Aurelius_Louvre_MR561_n01.jpg/400px-Marcus_Aurelius_Louvre_MR561_n01.jpg" alt="아우렐리우스">
                <span class="name">아우렐리우스</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+플라톤" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Plato_Silanion_Musei_Capitolini_MC1377.jpg/400px-Plato_Silanion_Musei_Capitolini_MC1377.jpg" alt="플라톤">
                <span class="name">플라톤</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+루소" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Jean-Jacques_Rousseau_%28painted_portrait%29.jpg/400px-Jean-Jacques_Rousseau_%28painted_portrait%29.jpg" alt="루소">
                <span class="name">루소</span>
            </a>
            
            <!-- 2세트 (자연스러운 무한 스크롤을 위해 복제) -->
            <a href="https://www.youtube.com/results?search_query=행복칠TV+쇼펜하우어" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Arthur_Schopenhauer_by_J_Sch%C3%A4fer%2C_1859b.jpg/400px-Arthur_Schopenhauer_by_J_Sch%C3%A4fer%2C_1859b.jpg" alt="쇼펜하우어">
                <span class="name">쇼펜하우어</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+톨스토이" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Tolstoy_in_1897.jpg/400px-Tolstoy_in_1897.jpg" alt="톨스토이">
                <span class="name">톨스토이</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+니체" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Nietzsche187a.jpg/400px-Nietzsche187a.jpg" alt="니체">
                <span class="name">니체</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+아우렐리우스" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Marcus_Aurelius_Louvre_MR561_n01.jpg/400px-Marcus_Aurelius_Louvre_MR561_n01.jpg" alt="아우렐리우스">
                <span class="name">아우렐리우스</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+플라톤" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Plato_Silanion_Musei_Capitolini_MC1377.jpg/400px-Plato_Silanion_Musei_Capitolini_MC1377.jpg" alt="플라톤">
                <span class="name">플라톤</span>
            </a>
            <a href="https://www.youtube.com/results?search_query=행복칠TV+루소" target="_blank" class="portrait-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Jean-Jacques_Rousseau_%28painted_portrait%29.jpg/400px-Jean-Jacques_Rousseau_%28painted_portrait%29.jpg" alt="루소">
                <span class="name">루소</span>
            </a>
        </div>
    </div>

    <!-- 화면 중앙에 들어갈 메인 상자(Glassmorphism 유리 효과)입니다 -->
    <main class="container">
        <header>
            <div class="logo-icon">🌿</div>
            <h1 class="title">행복을 칠하는<br>철학자 상담소</h1>
            <p class="intro-text">
                마음이 어지럽고 갈 길이 막막하신가요?<br>
                수백 년 전 지혜의 거장들이 당신을 위해 준비한<br>
                단 하나의 해답을 뽑아보세요.
            </p>
        </header>

        <hr class="divider">

        <!-- 사용자가 고민을 선택하는 영역입니다 -->
        <section class="selection-area">
            <label for="worry-select">지금 마음을 짓누르는 가장 무거운 고민은 무엇인가요?</label>
            <select id="worry-select">
                <option value="none">-- 고민을 선택해주세요 --</option>
                <option value="life">막막한 인생과 진로</option>
                <option value="human">상처받은 인간관계</option>
                <option value="mind">불안하고 복잡한 마음</option>
                <option value="politics">답답한 사회와 정치 현안</option>
            </select>
        </section>

        <!-- 룰렛 버튼과 빙글빙글 돌아가는 효과가 나타날 영역입니다 -->
        <section class="roulette-area">
            <button id="spin-btn" class="glow-on-hover" disabled>철학자의 조언 구하기</button>
            <div id="loading-spinner" class="hidden">
                <div class="spinner"></div>
                <p>철학자가 당신을 위한 지혜를 고르는 중입니다...</p>
            </div>
        </section>

        <!-- 명언 결과가 짠! 하고 나타나는 영역입니다 -->
        <section id="result-area" class="hidden">
            <div class="quote-card">
                <h2 id="philosopher-name">쇼펜하우어</h2>
                <blockquote id="quote-text">"인간의 행복은 거의 전적으로 그의 내면의 상태에 달려 있다."</blockquote>
                <p id="quote-interpretation">행복칠TV 해석: 남의 시선에 얽매이지 말고 당신의 마음을 먼저 돌보라는 뜻입니다.</p>
            </div>
            
            <!-- 유튜브 채널로 유도하는 가장 중요한 '수익화 버튼'입니다 -->
            <a href="#" target="_blank" class="youtube-btn" id="youtube-link">
                📺 이 철학자에 대한 행복칠TV 영상 바로보기
            </a>
        </section>
    </main>

    <!-- 룰렛이 돌아가고 결과가 나오는 마법(논리)을 담당할 자바스크립트 파일 연결입니다 -->
    <script src="app.js"></script>
</body>
</html>
